   NEXUS
   =====  
  Nexus Repository Manager:  often referred to as 
  Nexus Artifactory, is a repository manager used 
  for storing and managing software components. It 
  provides functionalities such as
  - dependency management, 
  - build artifact storage, 
  - releases, and distribution. 
  It helps streamline the 
  development workflow by offering a central 
  location to store and retrieve binary components.

  Rational:
    What happens if we lost the packages in Maven?
    What if we cannot access our packages?
    What if the build server is crashes?

  We need a disaster recovery strategy. 
  We need to create backups for are artefacts. 
  This is done by storing our artifacts 
  (.war) in artifactory managers like 
  Nexus.

  Examples of Artifactory Managers

  1.Nexus : - It is an open source artifactory 
              manager.
            - It is used to store and retrieve 
              build artifacts (like java web apps .war)
            - Nexus acts as a disaster recovery 
              server for maven. 
              (It is the Maven remote repository)
            - Artifacts can be retrieved when ever 
              needed.

  2.JFrog: - It is also used to store and retrieve 
             build artifacts.
            - It is licensed.

  3.Amazon CodeArtifacts: Also used to store and 
            retrieve build artifacts. 

  We support Java based application development. 

  Workflow
1. Maven Server:  
  Maven Goals 
    mvn package:  
    This will validate, compile, test and create
    artifacts in the target directory
    mvn install: 
    Creates and store artifacts in maven-local-
    repo & target directory
    MHD - /opt/maven/

    mvn deploy: uploads the build artifacts to 
    maven remote repository (Nexus)
          - validate
          - compile
          - test
          - create package in target directory
          - Packages created in mavenlocalrepo   
          - uploads THE PACKAGE to Nexus 
            (Maven remote-repo) Nexus


Nexus Installation: 
Pre-requisite:
Create Redhat EC2 t2.medium Instance with 4GB RAM.
Create Security Group and open Required ports.
8081
Installation Script:
sudo hostnamectl set-hostname nexus
sudo useradd nexus
sudo echo "nexus ALL=(ALL) NOPASSWD:ALL" | sudo tee /etc/sudoers.d/nexus 
sudo su - nexus
cd /opt
sudo yum install wget git nano unzip -y
sudo mkdir -p /usr/lib/jvm
sudo wget -O /tmp/openjdk11.tar.gz https://github.com/adoptium/temurin11-binaries/releases/download/jdk-11.0.22%2B7/OpenJDK11U-jdk_x64_linux_hotspot_11.0.22_7.tar.gz
sudo tar -zxvf /tmp/openjdk11.tar.gz -C /usr/lib/jvm/
sudo ln -s /usr/lib/jvm/jdk-11.0.22+7 /usr/lib/jvm/java-11-openjdk
sudo rm -f /tmp/openjdk11.tar.gz
/usr/lib/jvm/java-11-openjdk/bin/java -version
sudo wget https://download.sonatype.com/nexus/3/nexus-3.82.0-08-linux-x86_64.tar.gz
sudo tar -zxvf nexus-3.82.0-08-linux-x86_64.tar.gz
sudo mv /opt/nexus-3.82.0-08 /opt/nexus
sudo rm -rf nexus-3.82.0-08-linux-x86_64.tar.gz
sudo chown -R nexus:nexus /opt/nexus
sudo chown -R nexus:nexus /opt/sonatype-work
sudo chmod -R 775 /opt/nexus
sudo chmod -R 775 /opt/sonatype-work

cat <<EOF | sudo tee /etc/systemd/system/nexus.service > /dev/null
[Unit]
Description=Sonatype Nexus Service
After=network.target

[Service]
Type=forking
LimitNOFILE=65536
ExecStart=/opt/nexus/bin/nexus start
ExecStop=/opt/nexus/bin/nexus stop
User=nexus
Group=nexus
Restart=on-abort

[Install]
WantedBy=multi-user.target
EOF


sudo systemctl daemon-reload
sudo systemctl enable nexus
sudo systemctl start nexus

sudo systemctl status nexus

Default Port: 8081
Default User: admin
Password: cat /opt/sonatype-work/nexus3/admin.password




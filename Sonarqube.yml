Sonarqube Installation Script:

sudo apt update -y
sudo useradd -m -d /home/sonar -s /bin/bash sonar
echo "sonar ALL=(ALL) NOPASSWD:ALL" | sudo tee /etc/sudoers.d/sonar
sudo hostnamectl set-hostname sonar
sudo passwd sonar
sudo sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
sudo systemctl restart ssh
sudo apt install unzip wget git curl -y
sudo apt install openjdk-17-jdk -y
java -version
cd /opt
sudo wget https://binaries.sonarsource.com/Distribution/sonarqube/sonarqube-9.9.8.100196.zip
sudo unzip sonarqube-9.9.8.100196.zip
sudo mv sonarqube-9.9.8.100196 sonarqube
sudo rm -rf sonarqube-9.9.8.100196.zip
sudo chown -R sonar:sonar /opt/sonarqube
sudo chmod -R 775 /opt/sonarqube
sudo sysctl -w vm.max_map_count=262144
echo "vm.max_map_count=262144" | sudo tee -a /etc/sysctl.conf
sudo sysctl -p
sudo su - sonar
sh /opt/sonarqube/bin/linux-x86-64/sonar.sh start
sh /opt/sonarqube/bin/linux-x86-64/sonar.sh status



Inside Maven server

#1 install Java openJDK 11+ as a pre-requisit
   for maven to run.
    sudo apt update
    sudo hostnamectl set-hostname maven
    sudo su - ubuntu
    cd /opt
    sudo apt install git-all -y
    sudo apt install unzip -y
    sudo apt install wget -y
    sudo apt install openjdk-17-jdk -y
    java -version
    git --version


#2. Download, Extract and Install Maven
    sudo wget https://dlcdn.apache.org/maven/maven-3/3.9.16/binaries/apache-maven-3.9.16-bin.zip
    sudo unzip apache-maven-3.9.16-bin.zip
    sudo rm -rf apache-maven-3.9.16-bin.zip
    sudo mv apache-maven-3.9.16 maven

#3 Set Environmental Variable -
  echo 'export MAVEN_HOME=$HOME/maven' >> ~/.bash_profile
  echo 'export PATH=$PATH:$MAVEN_HOME/bin' >> ~/.bash_profile
  source ~/.bash_profile

#4Run the command
  mvn sonar:sonar


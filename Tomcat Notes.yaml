Introduction:

APACHE TOMCAT:
Tomcat or Apache Tomcat is a light weight, open 
source web container used to deploy and run 
java-based web applications. 
It is developed by Apache Software Foundation (ASF). 

What is Webserver: 
A Web server is a program that uses HTTP 
(Hypertext Transfer Protocol) protocol to serve 
web content (HTML and static content) to users. 

Examples: 
- Apache HTTP server 
- Nginx (pronounced engine X) 
- IBM HTTP server (IHS) 
- Oracle iplanet web server 
- Internet Information Server (IIS) 

What is an Application Server:
An application server is a container upon which you 
can build and expose business logic 
and processes to client applications through various 
protocols including HTTP in a n-tier architecture. 

Examples: 
- Apache Tomcat  --Apache 
- JBoss/WildFly - RedHat 
- WebLogic - Oracle 
- WebSphere Application Server - IBM 
- WebSphere Liberty Profile - IBM 
- Galssfish 

Tomcat installation:
The Apache Tomcat software is downloadable as a zip 
file which can be extracted and installed as follows 
Windows 
Step 1: Create the folder called Apache in any 
directory and Unzip apache software into 
that folder. 
Step 2: Open the command prompt and execute the below
commands. 
>cd C:\DevOps\Apache\apache-tomcat-7.0.79\bin 
>startup.bat (OR) > catalina.bat start ---> 
 Starting the Tomcat server. 

MAC/Linux: 
